services:
  app:
    build: ./docker
    container_name: somos-app
    volumes:
      - ./:/var/www/html
    networks:
      - somos-net
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: somos-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - somos-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: somos-db
    environment:
      MYSQL_DATABASE: somos
      MYSQL_USER: somos
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - somos-net

  redis:
    image: redis:7-alpine
    container_name: somos-redis
    ports:
      - "6379:6379"
    networks:
      - somos-net

  node:
    image: node:20-alpine
    container_name: somos-node
    working_dir: /var/www/html
    command: sh -c "npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    networks:
      - somos-net
    depends_on:
      - app

volumes:
  db-data:
  node_modules:

networks:
  somos-net:
